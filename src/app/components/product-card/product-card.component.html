<div class="product-card" (click)="onCardClick()">
  <div class="product-card__img-wrap">
    <img
      [src]="product.imageUrl"
      [alt]="product.name"
      onerror="this.src='https://via.placeholder.com/400x300/1e4a8c/ffffff?text=Gaming'"/>
  </div>

  <div class="product-card__body">
    <span class="product-card__cat">{{ product.categoryName }}</span>
    <h3 class="product-card__name">{{ product.name }}</h3>
    <p class="product-card__desc">{{ product.description }}</p>

    <div class="product-card__price">
      {{ product.price | number:'1.0-0' }} <span>DT</span>
    </div>

    <div class="product-card__qty" (click)="$event.stopPropagation()">
      <button class="qty-btn" (click)="decreaseQuantity()">−</button>
      <span class="qty-val">{{ quantity }}</span>
      <button class="qty-btn" (click)="increaseQuantity()">+</button>
    </div>

    <button class="product-card__add" (click)="$event.stopPropagation(); onAddToCart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      Ajouter
    </button>
  </div>
</div>
