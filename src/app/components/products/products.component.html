<section class="products-section">

  <!-- Header -->
  <div class="products-section__header">
    <h2 class="products-section__title">Tous les produits</h2>
    <span class="products-section__count" *ngIf="!loading">
      Affichage {{ startItem }}–{{ endItem }} de {{ productsCount }} article(s)
    </span>
  </div>

  <!-- Loading -->
  <div class="products-loading" *ngIf="loading">
    <i class="fas fa-circle-notch fa-spin"></i>
    <p>Chargement des produits...</p>
  </div>

  <!-- Error -->
  <div class="products-error" *ngIf="error && !loading">
    <i class="fas fa-exclamation-circle"></i>
    <p>{{ error }}</p>
    <button (click)="loadProducts()">Réessayer</button>
  </div>

  <!-- Products Grid -->
  <div class="products-grid" *ngIf="!loading && !error && paginatedProducts.length > 0">
    <app-product-card
      *ngFor="let product of paginatedProducts"
      [product]="product"
      (addToCart)="onAddToCart($event)">
    </app-product-card>
  </div>

  <!-- Pagination -->
  <div class="pagination" *ngIf="!loading && !error && totalPages > 1">

    <!-- Prev -->
    <button
      class="page-btn page-btn--arrow"
      (click)="prevPage()"
      [disabled]="currentPage === 1">
      &#10094;
    </button>

    <!-- Pages -->
    <ng-container *ngFor="let page of pageNumbers">
      <!-- Ellipse avant -->
      <span class="page-ellipsis"
        *ngIf="page === 2 && currentPage > 4">...</span>

      <button
        class="page-btn"
        [class.active]="page === currentPage"
        (click)="goToPage(page)"
        *ngIf="
          page === 1 ||
          page === totalPages ||
          (page >= currentPage - 1 && page <= currentPage + 1)
        ">
        {{ page }}
      </button>

      <!-- Ellipse après -->
      <span class="page-ellipsis"
        *ngIf="page === totalPages - 1 && currentPage < totalPages - 3">...</span>
    </ng-container>

    <!-- Next -->
    <button
      class="page-btn page-btn--arrow"
      (click)="nextPage()"
      [disabled]="currentPage === totalPages">
      &#10095;
    </button>

  </div>

  <!-- No results -->
  <div class="products-empty" *ngIf="!loading && !error && filteredProducts.length === 0">
    <i class="fas fa-search"></i>
    <p>Aucun produit trouvé pour "<strong>{{ searchQuery }}</strong>"</p>
  </div>

</section>
